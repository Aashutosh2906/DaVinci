<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVNC.ai - Engineering Intelligence Studio</title>
    
    <!-- San Francisco Font Alternative -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #007AFF;
            --secondary: #5856D6;
            --success: #34C759;
            --warning: #FF9500;
            --danger: #FF3B30;
            --dark: #1C1C1E;
            --gray-1: #8E8E93;
            --gray-2: #C7C7CC;
            --gray-3: #D1D1D6;
            --gray-4: #E5E5EA;
            --gray-5: #F2F2F7;
            --background: #FFFFFF;
            --surface: #F2F2F7;
            --glass: rgba(255, 255, 255, 0.72);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #000000;
                --surface: #1C1C1E;
                --glass: rgba(30, 30, 30, 0.72);
                --dark: #F2F2F7;
                --gray-1: #8E8E93;
                --gray-2: #636366;
                --gray-3: #48484A;
                --gray-4: #3A3A3C;
                --gray-5: #2C2C2E;
                --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
                --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.6);
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--background);
            color: var(--dark);
            line-height: 1.5;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: linear-gradient(135deg, 
                rgba(0, 122, 255, 0.03) 0%, 
                rgba(88, 86, 214, 0.03) 50%, 
                rgba(255, 149, 0, 0.03) 100%);
            pointer-events: none;
            z-index: -1;
        }

        /* Navigation Bar */
        .navbar {
            position: sticky;
            top: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--gray-4);
            z-index: 1000;
            padding: 0.75rem 0;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--dark);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--gray-1);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 0;
            position: relative;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--gray-1);
            max-width: 600px;
            margin: 0 auto 3rem;
            font-weight: 400;
        }

        /* Domain Pills */
        .domain-pills {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .domain-pill {
            padding: 0.75rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--gray-4);
            border-radius: 100px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--gray-1);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .domain-pill:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .domain-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .domain-pill.active::after {
            content: '✓';
            margin-left: 0.5rem;
        }

        /* Main Input Card */
        .input-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--gray-4);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }

        .input-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: block;
        }

        .prompt-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            background: var(--surface);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--dark);
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: all 0.2s;
        }

        .prompt-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--background);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .prompt-input::placeholder {
            color: var(--gray-2);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }

        .char-count {
            font-size: 0.875rem;
            color: var(--gray-2);
        }

        .submit-btn {
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading State */
        .loading-container {
            display: none;
            padding: 4rem;
            text-align: center;
        }

        .loading-container.show {
            display: block;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 1.5rem;
            border: 3px solid var(--gray-4);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--gray-1);
            font-size: 0.95rem;
        }

        /* Response Cards */
        .response-container {
            display: none;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        .response-container.show {
            display: grid;
        }

        .response-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--gray-4);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.2s;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-card:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .card-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
        }

        .card-content {
            color: var(--gray-1);
            line-height: 1.6;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--gray-4);
            font-size: 0.875rem;
            color: var(--gray-2);
        }

        .principle-tag {
            padding: 0.25rem 0.75rem;
            background: var(--surface);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--primary);
        }

        /* Synthesis Section */
        .synthesis-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, 
                rgba(0, 122, 255, 0.05), 
                rgba(88, 86, 214, 0.05));
            border: 1px solid rgba(0, 122, 255, 0.2);
        }

        .synthesis-content {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .synthesis-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .synthesis-number {
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* Visualization Canvas */
        .viz-canvas {
            background: var(--surface);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            height: 300px;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .viz-canvas.show {
            display: block;
        }

        .viz-svg {
            width: 100%;
            height: 100%;
        }

        .viz-path {
            fill: none;
            stroke: var(--primary);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.6;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 3rem 0;
            color: var(--gray-2);
            font-size: 0.875rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .container {
                padding: 1rem;
            }
            
            .response-container {
                grid-template-columns: 1fr;
            }
            
            .nav-links {
                display: none;
            }
        }

        /* Dark mode adjustments */
        @media (prefers-color-scheme: dark) {
            .prompt-input {
                background: var(--gray-5);
            }
            
            .response-card {
                background: rgba(30, 30, 30, 0.8);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="logo">
                <div class="logo-icon">DV</div>
                <span>DVNC.ai</span>
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link">How it Works</a>
                <a href="#" class="nav-link">Examples</a>
                <a href="#" class="nav-link">API</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1>Engineering Intelligence</h1>
            <p>Transform your ideas into breakthrough designs using Leonardo da Vinci's timeless principles and modern AI</p>
        </section>

        <!-- Domain Selection -->
        <div class="domain-pills">
            <button class="domain-pill active" data-domain="physics">
                Physics & Mechanics
            </button>
            <button class="domain-pill active" data-domain="biomechanics">
                Biomechanics
            </button>
            <button class="domain-pill active" data-domain="anatomy">
                Anatomy & Form
            </button>
        </div>

        <!-- Input Card -->
        <div class="input-card">
            <label class="input-label" for="promptInput">Engineering Challenge</label>
            <textarea 
                id="promptInput" 
                class="prompt-input"
                placeholder="Describe your engineering vision. For example: Design a biomimetic drone that uses principles from bird flight and lightweight structures..."
                maxlength="500"
            ></textarea>
            <div class="action-bar">
                <span class="char-count"><span id="charCount">0</span> / 500</span>
                <button class="submit-btn" id="submitBtn" onclick="processPrompt()">
                    <span>Generate Design</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 3L13 8L8 13M13 8H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Visualization Canvas -->
        <div class="viz-canvas" id="vizCanvas">
            <svg class="viz-svg" id="vizSvg"></svg>
        </div>

        <!-- Loading State -->
        <div class="loading-container" id="loadingContainer">
            <div class="loading-spinner"></div>
            <p class="loading-text">Analyzing principles from Da Vinci's manuscripts...</p>
        </div>

        <!-- Response Cards -->
        <div class="response-container" id="responseContainer">
            <!-- Cards will be dynamically inserted here -->
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by Renaissance Engineering Principles • © 2024 DVNC.ai</p>
        </footer>
    </div>

    <script>
        // Modern Knowledge Base
        const knowledgeBase = {
            physics: {
                name: 'Physics & Mechanics',
                icon: '⚙️',
                concepts: {
                    'aerodynamics': {
                        principle: 'Airflow optimization through wing curvature',
                        source: 'Codex on Flight',
                        applications: ['Aircraft design', 'Wind turbines', 'Vehicle aerodynamics']
                    },
                    'mechanics': {
                        principle: 'Mechanical advantage through gear ratios',
                        source: 'Codex Madrid',
                        applications: ['Robotics', 'Transmission systems', 'Power tools']
                    },
                    'hydraulics': {
                        principle: 'Fluid pressure for force multiplication',
                        source: 'Codex Leicester',
                        applications: ['Hydraulic systems', 'Water management', 'Pumps']
                    }
                }
            },
            biomechanics: {
                name: 'Biomechanics',
                icon: '🦾',
                concepts: {
                    'locomotion': {
                        principle: 'Natural movement patterns for efficiency',
                        source: 'Studies on Animal Motion',
                        applications: ['Prosthetics', 'Exoskeletons', 'Walking robots']
                    },
                    'structure': {
                        principle: 'Bone architecture for strength-to-weight',
                        source: 'Anatomical Studies',
                        applications: ['Lightweight structures', 'Building design', 'Materials']
                    },
                    'muscles': {
                        principle: 'Tendon and muscle synergy',
                        source: 'Windsor Manuscripts',
                        applications: ['Soft robotics', 'Actuators', 'Medical devices']
                    }
                }
            },
            anatomy: {
                name: 'Anatomy & Form',
                icon: '📐',
                concepts: {
                    'proportion': {
                        principle: 'Golden ratio in natural design',
                        source: 'Vitruvian Man',
                        applications: ['Ergonomics', 'Product design', 'Architecture']
                    },
                    'systems': {
                        principle: 'Interconnected biological networks',
                        source: 'Cardiovascular Studies',
                        applications: ['Network design', 'Distribution systems', 'IoT']
                    },
                    'sensing': {
                        principle: 'Multi-modal sensory integration',
                        source: 'Studies on Vision',
                        applications: ['Sensor arrays', 'Computer vision', 'AR/VR']
                    }
                }
            }
        };

        let activeDomains = ['physics', 'biomechanics', 'anatomy'];
        let isProcessing = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Character counter
            const promptInput = document.getElementById('promptInput');
            const charCount = document.getElementById('charCount');
            
            promptInput.addEventListener('input', () => {
                charCount.textContent = promptInput.value.length;
            });

            // Domain pill selection
            document.querySelectorAll('.domain-pill').forEach(pill => {
                pill.addEventListener('click', function() {
                    this.classList.toggle('active');
                    const domain = this.dataset.domain;
                    
                    if (this.classList.contains('active')) {
                        if (!activeDomains.includes(domain)) {
                            activeDomains.push(domain);
                        }
                    } else {
                        activeDomains = activeDomains.filter(d => d !== domain);
                    }
                });
            });

            // Keyboard shortcut
            promptInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                    processPrompt();
                }
            });
        });

        // Process the prompt
        async function processPrompt() {
            if (isProcessing) return;
            
            const promptInput = document.getElementById('promptInput');
            const prompt = promptInput.value.trim();
            
            if (!prompt) {
                showNotification('Please describe your engineering challenge');
                return;
            }
            
            if (activeDomains.length === 0) {
                showNotification('Please select at least one knowledge domain');
                return;
            }
            
            isProcessing = true;
            document.getElementById('submitBtn').disabled = true;
            
            // Hide previous results
            document.getElementById('responseContainer').classList.remove('show');
            document.getElementById('vizCanvas').classList.remove('show');
            
            // Show loading
            document.getElementById('loadingContainer').classList.add('show');
            
            // Simulate processing
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Generate insights
            const insights = analyzePrompt(prompt);
            
            // Show visualization
            createVisualization();
            
            // Generate and display response
            await new Promise(resolve => setTimeout(resolve, 500));
            displayResponse(prompt, insights);
            
            // Clean up
            document.getElementById('loadingContainer').classList.remove('show');
            document.getElementById('submitBtn').disabled = false;
            isProcessing = false;
        }

        // Analyze the prompt
        function analyzePrompt(prompt) {
            const promptLower = prompt.toLowerCase();
            const insights = {};
            
            activeDomains.forEach(domain => {
                const domainData = knowledgeBase[domain];
                insights[domain] = {
                    name: domainData.name,
                    icon: domainData.icon,
                    matches: []
                };
                
                // Find matching concepts
                Object.entries(domainData.concepts).forEach(([key, concept]) => {
                    if (promptLower.includes(key) || Math.random() > 0.5) {
                        insights[domain].matches.push({
                            key,
                            ...concept
                        });
                    }
                });
                
                // Ensure at least one match
                if (insights[domain].matches.length === 0) {
                    const concepts = Object.entries(domainData.concepts);
                    const [key, concept] = concepts[Math.floor(Math.random() * concepts.length)];
                    insights[domain].matches.push({ key, ...concept });
                }
            });
            
            return insights;
        }

        // Create visualization
        function createVisualization() {
            const canvas = document.getElementById('vizCanvas');
            const svg = document.getElementById('vizSvg');
            
            canvas.classList.add('show');
            svg.innerHTML = '';
            
            // Create network visualization
            const nodes = activeDomains.length;
            const centerX = 150;
            const centerY = 150;
            const radius = 80;
            
            // Draw connections
            for (let i = 0; i < nodes; i++) {
                for (let j = i + 1; j < nodes; j++) {
                    const angle1 = (i * 2 * Math.PI) / nodes;
                    const angle2 = (j * 2 * Math.PI) / nodes;
                    const x1 = centerX + radius * Math.cos(angle1);
                    const y1 = centerY + radius * Math.sin(angle1);
                    const x2 = centerX + radius * Math.cos(angle2);
                    const y2 = centerY + radius * Math.sin(angle2);
                    
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${x1} ${y1} Q ${centerX} ${centerY} ${x2} ${y2}`);
                    path.setAttribute('class', 'viz-path');
                    path.style.animation = `fadeIn 1s ease-out ${i * 0.2}s both`;
                    svg.appendChild(path);
                }
            }
            
            // Draw nodes
            activeDomains.forEach((domain, i) => {
                const angle = (i * 2 * Math.PI) / nodes;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', '8');
                circle.setAttribute('fill', '#007AFF');
                circle.style.animation = `fadeIn 0.5s ease-out ${i * 0.2 + 0.5}s both`;
                svg.appendChild(circle);
            });
        }

        // Display the response
        function displayResponse(prompt, insights) {
            const container = document.getElementById('responseContainer');
            container.innerHTML = '';
            
            // Create cards for each domain
            Object.entries(insights).forEach(([domain, data], index) => {
                if (data.matches.length > 0) {
                    const card = createResponseCard(data, index * 0.1);
                    container.appendChild(card);
                }
            });
            
            // Create synthesis card
            const synthesisCard = createSynthesisCard(prompt, insights);
            container.appendChild(synthesisCard);
            
            container.classList.add('show');
        }

        // Create response card
        function createResponseCard(data, delay) {
            const card = document.createElement('div');
            card.className = 'response-card';
            card.style.animationDelay = `${delay}s`;
            
            const match = data.matches[0];
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">${data.icon}</div>
                    <h3 class="card-title">${data.name}</h3>
                </div>
                <div class="card-content">
                    <p><strong>Principle:</strong> ${match.principle}</p>
                    <p><strong>Applications:</strong> ${match.applications.join(', ')}</p>
                </div>
                <div class="card-meta">
                    <span class="principle-tag">${match.source}</span>
                </div>
            `;
            
            return card;
        }

        // Create synthesis card
        function createSynthesisCard(prompt, insights) {
            const card = document.createElement('div');
            card.className = 'response-card synthesis-card';
            card.style.animationDelay = '0.3s';
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">✨</div>
                    <h3 class="card-title">Integrated Design Synthesis</h3>
                </div>
                <div class="card-content">
                    <p>Based on your vision: "${prompt}"</p>
                    <div class="synthesis-content">
                        <div class="synthesis-item">
                            <span class="synthesis-number">1</span>
                            <span>Apply biomimetic principles to optimize structural efficiency</span>
                        </div>
                        <div class="synthesis-item">
                            <span class="synthesis-number">2</span>
                            <span>Integrate mechanical systems using Renaissance mathematical ratios</span>
                        </div>
                        <div class="synthesis-item">
                            <span class="synthesis-number">3</span>
                            <span>Harmonize form and function through natural proportions</span>
                        </div>
                    </div>
                </div>
            `;
            
            return card;
        }

        // Show notification
        function showNotification(message) {
            // Simple alert for now, could be replaced with a toast notification
            alert(message);
        }

        // Add fade-in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
